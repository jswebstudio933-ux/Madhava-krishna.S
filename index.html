<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madhava Krishna .S | AI-Focused Software Developer Portfolio</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Professional portfolio of Madhava Krishna .S, an AI-focused software developer and CSE graduate. Specializing in AI/ML solutions, cybersecurity phishing detection, Java, and Spring Boot microservices.">
  <meta name="keywords" content="Madhava Krishna .S, Software Developer, Accelya, AI Developer, Machine Learning, Spring Boot, Java, Portfolio, Fresher Developer">
  <meta name="author" content="Madhava Krishna .S">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            darkBg: '#090d16',
            darkCard: 'rgba(15, 23, 42, 0.45)',
            lightBg: '#f8fafc',
            lightCard: 'rgba(255, 255, 255, 0.65)',
            primary: {
              50: '#eef2ff',
              100: '#e0e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            },
            secondary: {
              400: '#22d3ee',
              500: '#06b6d4',
              600: '#0891b2',
            }
          },
          boxShadow: {
            'neon-indigo': '0 0 20px rgba(99, 102, 241, 0.25)',
            'neon-cyan': '0 0 20px rgba(6, 182, 212, 0.25)',
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React and ReactDOM UMD CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel compiler CDN for JSX support -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-darkBg antialiased selection:bg-indigo-500 selection:text-white transition-colors duration-300">
  
  <!-- Root React container -->
  <div id="root"></div>

  <!-- Load Babel script to compile React components in the browser -->
  <script type="text/babel" src="./app.js"></script>

  <!-- Fallback Lucide Icon loader -->
  <script>
    window.addEventListener('load', function() {
      // In case lucide needs a small delay to register, trigger it
      setTimeout(function() {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, 500);
    });
  </script>
</body>
</html>
