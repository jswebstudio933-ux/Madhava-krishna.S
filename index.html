  <!-- Custom styles -->
  <style>
/* styles.css - Custom styling for Madhava Krishna .S Portfolio */

@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  font-family: 'Plus Jakarta Sans', sans-serif;
}

/* Custom Scrollbar */
::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-track {
  background: #0b0f19;
}
.light ::-webkit-scrollbar-track {
  background: #f1f5f9;
}
::-webkit-scrollbar-thumb {
  background: #1e293b;
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: #4f46e5;
}
.light ::-webkit-scrollbar-thumb {
  background: #cbd5e1;
}
.light ::-webkit-scrollbar-thumb:hover {
  background: #6366f1;
}

/* Hide scrollbar when loading */
.loading-active {
  overflow: hidden;
}

/* Glassmorphism base classes */
.glass-panel {
  background: rgba(15, 23, 42, 0.45);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.light .glass-panel {
  background: rgba(255, 255, 255, 0.65);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(0, 0, 0, 0.06);
  box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04);
}

/* Card Glow Effects */
.glow-card {
  position: relative;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.glow-card::before {
  content: '';
  position: absolute;
  inset: -1px;
  background: linear-gradient(90deg, #6366f1, #06b6d4, #ec4899);
  border-radius: inherit;
  z-index: -1;
  opacity: 0;
  transition: opacity 0.4s ease;
}

.glow-card:hover::before {
  opacity: 0.7;
}

.glow-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.4);
}

.light .glow-card:hover {
  box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.15);
}

/* Animated Grid Background */
.bg-grid-cyber {
  background-size: 40px 40px;
  background-image: 
    linear-gradient(to right, rgba(99, 102, 241, 0.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(99, 102, 241, 0.04) 1px, transparent 1px);
}

.light .bg-grid-cyber {
  background-image: 
    linear-gradient(to right, rgba(99, 102, 241, 0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
}

/* Background Blobs */
@keyframes blob-float {
  0% {
    transform: translate(0px, 0px) scale(1);
  }
  33% {
    transform: translate(30px, -50px) scale(1.1);
  }
  66% {
    transform: translate(-20px, 20px) scale(0.95);
  }
  100% {
    transform: translate(0px, 0px) scale(1);
  }
}

.animate-blob-1 {
  animation: blob-float 12s infinite alternate ease-in-out;
}

.animate-blob-2 {
  animation: blob-float 15s infinite alternate-reverse ease-in-out;
  animation-delay: 2s;
}

.animate-blob-3 {
  animation: blob-float 18s infinite alternate ease-in-out;
  animation-delay: 4s;
}

/* Text Shimmer Effect */
.shimmer-text {
  background: linear-gradient(
    to right,
    #9333ea,
    #4f46e5 20%,
    #06b6d4 40%,
    #06b6d4 60%,
    #4f46e5 80%,
    #9333ea
  );
  background-size: 200% auto;
  color: transparent;
  -webkit-background-clip: text;
  background-clip: text;
  animation: shimmer 8s linear infinite;
}

@keyframes shimmer {
  to {
    background-position: 200% center;
  }
}

/* Skill Progress Fill Animation */
@keyframes progress-fill {
  from { width: 0%; }
}
.skills-active .skill-progress-bar {
  animation: progress-fill 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

/* Typing Caret Animation */
@keyframes caret-pulse {
  50% { border-color: transparent; }
}
.typing-caret {
  border-right: 3px solid #6366f1;
  animation: caret-pulse 0.75s step-end infinite;
}

/* Cursor Glow Indicator */
.custom-cursor-glow {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(6, 182, 212, 0.03) 50%, transparent 100%);
  border-radius: 50%;
  pointer-events: none;
  position: fixed;
  transform: translate(-50%, -50%);
  z-index: 10;
  transition: width 0.3s ease, height 0.3s ease;
  will-change: transform;
}

.light .custom-cursor-glow {
  background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, rgba(6, 182, 212, 0.01) 50%, transparent 100%);
}

/* Glowing Pulsating Dots */
@keyframes pulse-glow {
  0%, 100% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
  }
  50% {
    transform: scale(1.2);
    box-shadow: 0 0 15px 4px rgba(99, 102, 241, 0);
  }
}

.pulse-dot {
  animation: pulse-glow 2s infinite ease-in-out;
}

/* Timeline vertical line drawing */
.timeline-line {
  background: linear-gradient(to bottom, #6366f1, #06b6d4, #ec4899);
}

/* Spinner Rotate */
@keyframes spin-slow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.animate-spin-slow {
  animation: spin-slow 8s linear infinite;
}

/* Reveal transition utilities */
.reveal-visible {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.8s ease-out, transform 0.8s ease-out;
}

.reveal-hidden {
  opacity: 0;
  transform: translateY(20px);
}

/* Decorative Card SVG Grids */
.card-grid-dots {
  background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
  background-size: 10px 10px;
}
.light .card-grid-dots {
  background-image: radial-gradient(rgba(0, 0, 0, 0.08) 1px, transparent 1px);
}

  </style>
</head>
<body class="bg-darkBg antialiased selection:bg-indigo-500 selection:text-white transition-colors duration-300">
  
  <!-- Root React container -->
  <div id="root"></div>

  

  <!-- Load Babel script to compile React components in the browser -->
  <script type="text/babel">
// app.js - React and Babel JSX application logic for Madhava Krishna .S Portfolio
// Profile photo: ./profile.png

const { useState, useEffect, useRef } = React;

// Main App Component
function App() {
  const [darkMode, setDarkMode] = useState(true);
  const [scrollPercent, setScrollPercent] = useState(0);
  const [activeSection, setActiveSection] = useState('home');
  const [loading, setLoading] = useState(true);
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
  const [showResumeModal, setShowResumeModal] = useState(false);
  const [isFormSubmitted, setIsFormSubmitted] = useState(false);
  const [formData, setFormData] = useState({ name: '', email: '', subject: '', message: '' });
  const [isSending, setIsSending] = useState(false);

  // Stats Counters
  const [stats, setStats] = useState({ projects: 0, models: 0, hours: 0, languages: 0 });

  // Handle dark mode toggle
  useEffect(() => {
    if (darkMode) {
      document.documentElement.classList.add('dark');
      document.documentElement.classList.remove('light');
    } else {
      document.documentElement.classList.add('light');
      document.documentElement.classList.remove('dark');
    }
  }, [darkMode]);

  // Track scroll percentage and active sections
  useEffect(() => {
    const handleScroll = () => {
      // Scroll Progress Bar
      const totalScroll = document.documentElement.scrollHeight - window.innerHeight;
      if (totalScroll > 0) {
        setScrollPercent(Math.min((window.scrollY / totalScroll) * 100, 100));
      }

      // Active Section Tracker
      const sections = ['home', 'about', 'skills', 'experience', 'projects', 'education', 'contact'];
      const scrollPosition = window.scrollY + 200;

      for (const section of sections) {
        const el = document.getElementById(section);
        if (el) {
          const top = el.offsetTop;
          const height = el.offsetHeight;
          if (scrollPosition >= top && scrollPosition < top + height) {
            setActiveSection(section);
            break;
          }
        }
      }
    };

    window.addEventListener('scroll', handleScroll);
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  // Track mouse coordinates for cursor glow (only on desktop/pointer device)
  useEffect(() => {
    const handleMouseMove = (e) => {
      setMousePos({ x: e.clientX, y: e.clientY });
    };
    window.addEventListener('mousemove', handleMouseMove);
    return () => window.removeEventListener('mousemove', handleMouseMove);
  }, []);

  // End preloading after timeout and animate counters
  useEffect(() => {
    const timer = setTimeout(() => {
      setLoading(false);
      
      // Animate Stats
      let prj = 0, mdl = 0, hrs = 0, lng = 0;
      const targetPrj = 5, targetMdl = 12, targetHrs = 600, targetLng = 4;
      const duration = 2000; // 2 seconds
      const steps = 50;
      const stepTime = duration / steps;
      
      const counterInterval = setInterval(() => {
        let finished = true;
        
        if (prj < targetPrj) { prj += Math.ceil(targetPrj / steps); if (prj > targetPrj) prj = targetPrj; finished = false; }
        if (mdl < targetMdl) { mdl += Math.ceil(targetMdl / steps); if (mdl > targetMdl) mdl = targetMdl; finished = false; }
        if (hrs < targetHrs) { hrs += Math.ceil(targetHrs / steps); if (hrs > targetHrs) hrs = targetHrs; finished = false; }
        if (lng < targetLng) { lng += Math.ceil(targetLng / steps); if (lng > targetLng) lng = targetLng; finished = false; }
        
        setStats({
          projects: prj,
          models: mdl,
          hours: hrs,
          languages: lng
        });
        
        if (finished) clearInterval(counterInterval);
      }, stepTime);
      
    }, 1800);

    return () => clearTimeout(timer);
  }, []);

  // Custom Form Submission
  const handleFormSubmit = (e) => {
    e.preventDefault();
    setIsSending(true);
    // Simulate API request
    setTimeout(() => {
      setIsSending(false);
      setIsFormSubmitted(true);
      setFormData({ name: '', email: '', subject: '', message: '' });
      // Reset toast after 5s
      setTimeout(() => setIsFormSubmitted(false), 5000);
    }, 1500);
  };

  const handleInputChange = (e) => {
    const { name, value } = e.target;
    setFormData(prev => ({ ...prev, [name]: value }));
  };

  return (
    <div className={`min-h-screen text-slate-100 dark:text-slate-100 transition-colors duration-300 ${darkMode ? 'bg-darkBg' : 'bg-lightBg text-slate-800'}`}>
      
      {/* 1. Loading Preloader */}
      {loading && <LoadingScreen />}

      {/* 2. Custom Cursor Glow */}
      <div 
        className="custom-cursor-glow hidden md:block" 
        style={{ left: `${mousePos.x}px`, top: `${mousePos.y}px` }}
      />

      {/* 3. Scroll Progress Indicator */}
      <div className="fixed top-0 left-0 w-full h-[3px] z-[100] bg-slate-800/10 dark:bg-slate-700/20">
        <div 
          className="h-full bg-gradient-to-r from-indigo-500 via-cyan-500 to-pink-500 transition-all duration-75"
          style={{ width: `${scrollPercent}%` }}
        />
      </div>

      {/* 4. Navigation Bar */}
      <Navbar 
        darkMode={darkMode} 
        setDarkMode={setDarkMode} 
        activeSection={activeSection}
        mobileMenuOpen={mobileMenuOpen}
        setMobileMenuOpen={setMobileMenuOpen}
        setShowResumeModal={setShowResumeModal}
      />

      {/* 5. Main Hero Section */}
      <Hero id="home" setShowResumeModal={setShowResumeModal} />

      {/* 6. About Section */}
      <About id="about" stats={stats} />

      {/* 7. Skills Section */}
      <Skills id="skills" />

      {/* 8. Experience Section */}
      <Experience id="experience" />

      {/* 9. Projects Section */}
      <Projects id="projects" />

      {/* 10. Education Section */}
      <Education id="education" />

      {/* 11. Contact Section */}
      <Contact 
        id="contact" 
        formData={formData} 
        isSending={isSending}
        handleFormSubmit={handleFormSubmit}
        handleInputChange={handleInputChange}
        isFormSubmitted={isFormSubmitted}
        setIsFormSubmitted={setIsFormSubmitted}
      />

      {/* 12. Footer */}
      <Footer />

      {/* 13. Resume Modal */}
      {showResumeModal && <ResumeModal onClose={() => setShowResumeModal(false)} />}
    </div>
  );
}

// Sub-Component: Loading Preloader
function LoadingScreen() {
  return (
    <div className="fixed inset-0 bg-[#070a13] z-[9999] flex flex-col items-center justify-center">
      <div className="relative flex flex-col items-center">
        {/* Futuristic Glowing Ring */}
        <div className="relative w-28 h-28 flex items-center justify-center">
          <div className="absolute inset-0 rounded-full border-2 border-dashed border-indigo-500/30 animate-spin-slow"></div>
          <div className="absolute inset-2 rounded-full border-b-2 border-r-2 border-cyan-400 animate-spin"></div>
          <div className="absolute inset-4 rounded-full border-t-2 border-l-2 border-pink-500 animate-pulse"></div>
          <span className="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 font-mono">MK</span>
        </div>
        
        {/* Dynamic Loading Texts */}
        <h3 className="mt-8 text-sm font-semibold tracking-[0.3em] text-indigo-400 animate-pulse font-mono">
          SYSTEMS INITIALIZING...
        </h3>
        
        {/* Simulated Progress text */}
        <p className="mt-2 text-xs font-mono text-slate-500">
          AI & Core Microservices Loaded
        </p>

        {/* Small Progress Bar */}
        <div className="w-48 h-1 bg-slate-800 rounded-full mt-4 overflow-hidden relative">
          <div className="h-full bg-gradient-to-r from-indigo-500 to-cyan-400 absolute left-0 top-0 w-0 animate-[loading-bar_1.8s_ease-out_forwards]"></div>
        </div>
      </div>
      <style>{`
        @keyframes loading-bar {
          100% { width: 100%; }
        }
      `}</style>
    </div>
  );
}

// Sub-Component: Navigation Bar
function Navbar({ darkMode, setDarkMode, activeSection, mobileMenuOpen, setMobileMenuOpen, setShowResumeModal }) {
  const navItems = [
    { id: 'home', label: 'Home' },
    { id: 'about', label: 'About' },
    { id: 'skills', label: 'Skills' },
    { id: 'experience', label: 'Experience' },
    { id: 'projects', label: 'Projects' },
    { id: 'education', label: 'Education' },
    { id: 'contact', label: 'Contact' }
  ];

  return (
    <nav className="fixed top-0 left-0 w-full z-50 glass-panel border-b transition-all duration-300 py-4">
      <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
        {/* Brand Logo removed per request */}
        <div></div>

        {/* Desktop Links */}
        <div className="hidden lg:flex items-center space-x-8">
          {navItems.map((item) => (
            <a
              key={item.id}
              href={`#${item.id}`}
              className={`text-sm font-medium tracking-wide transition-all duration-200 relative py-1 hover:text-indigo-500 ${
                activeSection === item.id 
                  ? 'text-indigo-500 font-semibold' 
                  : 'dark:text-slate-300 text-slate-600'
              }`}
            >
              {item.label}
              {activeSection === item.id && (
                <span className="absolute bottom-0 left-0 w-full h-[2px] bg-gradient-to-r from-indigo-500 to-cyan-500 rounded-full" />
              )}
            </a>
          ))}
        </div>

        {/* Action Controls */}
        <div className="hidden lg:flex items-center space-x-4">
          {/* Dark Mode Toggle */}
          <button 
            onClick={() => setDarkMode(!darkMode)}
            className="w-10 h-10 rounded-xl flex items-center justify-center border border-slate-700/30 hover:bg-slate-800/10 dark:hover:bg-slate-700/30 transition-colors"
            title="Toggle Theme"
          >
            {darkMode ? (
              <i data-lucide="sun" className="w-5 h-5 text-amber-400 animate-spin-slow"></i>
            ) : (
              <i data-lucide="moon" className="w-5 h-5 text-slate-600"></i>
            )}
          </button>

          {/* CV Button */}
          <button 
            onClick={() => setShowResumeModal(true)}
            className="px-5 py-2.5 rounded-xl bg-gradient-to-r from-indigo-600 to-cyan-500 hover:from-indigo-500 hover:to-cyan-400 text-white text-xs font-semibold tracking-wider uppercase transition-all duration-300 shadow-neon-indigo hover:shadow-neon-cyan active:scale-95"
          >
            Download CV
          </button>
        </div>

        {/* Mobile Navbar Hamburger & Controls */}
        <div className="flex items-center space-x-3 lg:hidden">
          <button 
            onClick={() => setDarkMode(!darkMode)}
            className="w-9 h-9 rounded-xl flex items-center justify-center border border-slate-700/30 hover:bg-slate-800/10 dark:hover:bg-slate-700/30 transition-colors"
          >
            {darkMode ? (
              <i data-lucide="sun" className="w-4 h-4 text-amber-400"></i>
            ) : (
              <i data-lucide="moon" className="w-4 h-4 text-slate-600"></i>
            )}
          </button>
          
          <button 
            onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
            className="w-9 h-9 rounded-xl flex items-center justify-center border border-slate-700/30 hover:bg-slate-800/10 dark:hover:bg-slate-700/30 transition-colors"
          >
            <i data-lucide={mobileMenuOpen ? "x" : "menu"} className="w-5 h-5 text-indigo-500"></i>
          </button>
        </div>
      </div>

      {/* Mobile Drawer Menu */}
      {mobileMenuOpen && (
        <div className="lg:hidden absolute top-[72px] left-0 w-full glass-panel border-b py-6 px-8 flex flex-col space-y-4 animate-fade-in">
          {navItems.map((item) => (
            <a
              key={item.id}
              href={`#${item.id}`}
              onClick={() => setMobileMenuOpen(false)}
              className={`text-md font-medium tracking-wide py-1 transition-all ${
                activeSection === item.id 
                  ? 'text-indigo-500 pl-2 border-l-2 border-indigo-500 font-semibold' 
                  : 'dark:text-slate-300 text-slate-600'
              }`}
            >
              {item.label}
            </a>
          ))}
          <button 
            onClick={() => { setMobileMenuOpen(false); setShowResumeModal(true); }}
            className="w-full mt-4 py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-cyan-500 text-white font-semibold text-sm text-center"
          >
            Download CV
          </button>
        </div>
      )}
    </nav>
  );
}

// Sub-Component: Typing Effect hook / component
function TypingEffect({ texts }) {
  const [text, setText] = useState('');
  const [index, setIndex] = useState(0);
  const [subIndex, setSubIndex] = useState(0);
  const [reverse, setReverse] = useState(false);

  useEffect(() => {
    if (subIndex === texts[index].length + 1 && !reverse) {
      const timeout = setTimeout(() => setReverse(true), 1500); // Hold time
      return () => clearTimeout(timeout);
    }

    if (subIndex === 0 && reverse) {
      setReverse(false);
      setIndex((prev) => (prev + 1) % texts.length);
      return;
    }

    const timeout = setTimeout(() => {
      setSubIndex((prev) => prev + (reverse ? -1 : 1));
    }, reverse ? 30 : 60);

    return () => clearTimeout(timeout);
  }, [subIndex, reverse, index, texts]);

  useEffect(() => {
    setText(texts[index].substring(0, subIndex));
  }, [subIndex, index, texts]);

  return (
    <span className="typing-caret pb-1 pr-1 font-mono font-bold dark:text-cyan-400 text-indigo-600">
      {text}
    </span>
  );
}

// Sub-Component: Hero Section
function Hero({ id, setShowResumeModal }) {
  const typingSkills = ["AI Enthusiast", "Computer Science Engineer", "Future-Focused Developer", "Spring Boot & Java Coder"];

  useEffect(() => {
    // Re-initialize lucide icons inside components if needed
    if (window.lucide) window.lucide.createIcons();
  }, []);

  return (
    <section id={id} className="min-h-screen relative flex items-center justify-center pt-24 overflow-hidden bg-grid-cyber">
      
      {/* Premium Background Blobs */}
      <div className="absolute top-[20%] left-[10%] w-[350px] h-[350px] rounded-full bg-indigo-600/10 blur-[100px] animate-blob-1 dark:block hidden" />
      <div className="absolute bottom-[20%] right-[10%] w-[400px] h-[400px] rounded-full bg-cyan-500/10 blur-[100px] animate-blob-2 dark:block hidden" />
      <div className="absolute top-[40%] right-[30%] w-[300px] h-[300px] rounded-full bg-pink-500/10 blur-[90px] animate-blob-3 dark:block hidden" />

      {/* Main Container */}
      <div className="max-w-6xl mx-auto px-6 relative z-10 grid grid-cols-1 lg:grid-cols-12 gap-12 items-center w-full py-12">
        
        {/* Hero Copy (8 cols) */}
        <div className="lg:col-span-7 flex flex-col text-center lg:text-left">

// Sub-Component: Contact Section
function Contact({ id, formData, isSending, handleFormSubmit, handleInputChange, isFormSubmitted, setIsFormSubmitted }) {

  }, [isFormSubmitted]);

        </div>

        {/* Contact Content & Form layout */}

          {/* Left Column: Direct Info (5 cols) */}

              </p>
            </div>

            {/* Direct details grid */}
            <div className="space-y-4 pt-4">
              <div className="flex items-center space-x-4 p-4 rounded-2xl glass-panel border border-slate-700/10">
                <div className="w-10 h-10 rounded-xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center text-indigo-400">
                  <i data-lucide="mail" className="w-5 h-5" />
                </div>
                <div>
                  <h5 className="text-[10px] uppercase font-mono tracking-widest text-slate-500 font-bold">Email Me</h5>
                  <p className="text-xs sm:text-sm font-semibold dark:text-white text-slate-800 select-all">
                    madhavakrishna.s@outlook.com
                  </p>
                </div>
              </div>

              <div className="flex items-center space-x-4 p-4 rounded-2xl glass-panel border border-slate-700/10">
                <div className="w-10 h-10 rounded-xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center text-indigo-400">

                </div>
                <div>
                  <h5 className="text-[10px] uppercase font-mono tracking-widest text-slate-500 font-bold">Location</h5>

                    Mumbai, India
                  </p>
                </div>
              </div>
            </div>

            {/* Social Icons list */}
            <div className="flex space-x-4 pt-4">
              <a

                target="_blank" 
                rel="noreferrer"
                className="w-12 h-12 rounded-2xl glass-panel border border-slate-700/20 flex items-center justify-center dark:text-slate-300 text-slate-600 hover:text-indigo-500 dark:hover:text-indigo-400 hover:-translate-y-1 transition-all duration-300"
                title="LinkedIn Profile"
              >
                <i data-lucide="linkedin" className="w-5 h-5" />
              </a>

              <a 
                href="https://github.com" 
                target="_blank" 
                rel="noreferrer"
                className="w-12 h-12 rounded-2xl glass-panel border border-slate-700/20 flex items-center justify-center dark:text-slate-300 text-slate-600 hover:text-cyan-400 hover:-translate-y-1 transition-all duration-300"
                title="GitHub Profile"
              >
                <i data-lucide="github" className="w-5 h-5" />
              </a>

              <a 
                href="mailto:madhavakrishna.s@outlook.com" 
                className="w-12 h-12 rounded-2xl glass-panel border border-slate-700/20 flex items-center justify-center dark:text-slate-300 text-slate-600 hover:text-pink-500 hover:-translate-y-1 transition-all duration-300"
                title="Email Message"
              >
                <i data-lucide="send" className="w-5 h-5" />

                    <input 
                      type="text" 
                      name="name"
                      required
                      value={formData.name}
                      onChange={handleInputChange}
                      placeholder="Your Name"
                      className="w-full px-4 py-3 rounded-xl bg-slate-900/50 dark:bg-slate-950/50 border border-slate-700/30 focus:border-indigo-500 dark:text-white text-slate-800 outline-none transition-all duration-300 text-sm"
                    />

                  {/* Email Input */}
                  <div className="relative">
                    <label className="text-xs font-mono font-bold tracking-wider text-slate-400 uppercase block mb-2">Email Address</label>

                      name="email"
                      required

                      <i data-lucide="loader-2" className="w-4 h-4 mr-2 animate-spin" />

                    </>
                  ) : (
                    <>
                      <i data-lucide="send-horizontal" className="w-4.5 h-4.5 mr-2" />
                      Transmit Message
                    </>
                  )}
                </button>
              </form>

              {/* Decorative grid pattern */}
              <div className="absolute bottom-2 right-2 w-12 h-12 card-grid-dots opacity-20 pointer-events-none" />
            </div>
          </div>

        </div>

      </div>

      {/* Modern custom toast alert upon success */}
      {isFormSubmitted && (
        <div className="fixed bottom-6 right-6 z-[100] max-w-sm glass-panel p-4 rounded-2xl border-l-4 border-indigo-500 shadow-2xl flex items-start space-x-3.5 animate-[fade-in-up_0.3s_ease-out_forwards]">
          <div className="w-8 h-8 rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-400 shrink-0 mt-0.5">
            <i data-lucide="shield-check" className="w-4.5 h-4.5" />
          </div>
          <div>
            <h4 className="text-sm font-bold dark:text-white text-slate-800">Connection Secured!</h4>
            <p className="text-xs dark:text-slate-400 text-slate-500 mt-1">
              Your message was sent successfully. Madhava will reach out to you shortly.
            </p>
            <button 
              onClick={() => setIsFormSubmitted(false)}
              className="text-[10px] font-bold text-indigo-400 hover:text-indigo-300 mt-2 block"
            >
              Dismiss
            </button>
          </div>
        </div>
      )}

    </section>
  );
}

  const handleDownload = () => {

    link.setAttribute('download', 'Madhava_Krishna_S_Resume.pdf');

    // Simple prompt simulating standard PDF download
    alert("Simulating PDF Download! Madhava Krishna's professional CV in PDF structure will download here.");

  return (
    <div className="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md animate-[fade-in_0.3s_ease-out]">
      <div className="glass-panel w-full max-w-lg rounded-3xl border border-white/10 p-6 relative overflow-hidden flex flex-col items-center text-center shadow-2xl">

        </div>

        <h3 className="text-xl font-bold dark:text-white text-slate-800">
          Download Professional CV
        </h3>
        
        <p className="text-sm dark:text-slate-400 text-slate-500 max-w-sm mt-2 leading-relaxed">
          Access the complete, recruiter-ready resume of Madhava Krishna .S containing details about Accelya engineering roles, ML achievements, and spring microservices.
        </p>

        {/* Action Button */}
        <button 
          onClick={handleDownload}
          className="mt-6 px-8 py-3.5 rounded-xl bg-gradient-to-r from-indigo-600 to-cyan-500 text-white text-xs font-semibold uppercase tracking-wider transition-all duration-300 shadow-neon-indigo flex items-center"

}
